<div class="prod">
  @if (imageUrl()) {
    <img
      class="prod__thumb prod__thumb--img"
      [src]="imageUrl()!"
      [alt]="name()"
      loading="lazy"
    />
  } @else {
    <span class="prod__thumb prod__thumb--empty" aria-hidden="true">—</span>
  }
  <div>
    <div class="prod__name">{{ name() }}</div>
    @if (subtitle()) {
      <div class="prod__sku muted">{{ subtitle() }}</div>
    }
  </div>
</div>
